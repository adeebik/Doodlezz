envVarGroups:
  - name: eraser-shared
    envVars:
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: eraser-db
    databaseName: eraser
    plan: free

services:
  # Backend (HTTP Server)
  - type: web
    name: eraser-backend
    env: docker
    dockerContext: .
    dockerfilePath: docker/Dockerfile.be
    plan: free
    envVars:
      - fromGroup: eraser-shared
      - key: DATABASE_URL
        fromDatabase:
          name: eraser-db
          property: connectionString
      - key: PORT
        value: 3002

  # WebSocket Server
  - type: web
    name: eraser-ws
    env: docker
    dockerContext: .
    dockerfilePath: docker/Dockerfile.ws
    plan: free
    envVars:
      - fromGroup: eraser-shared
      - key: DATABASE_URL
        fromDatabase:
          name: eraser-db
          property: connectionString
      - key: PORT
        value: 8080

  # Frontend (Doodlezz)
  - type: web
    name: eraser-frontend
    env: docker
    dockerContext: .
    dockerfilePath: docker/Dockerfile.fe
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: eraser-backend
          property: host
      - key: NEXT_PUBLIC_WS_URL
        fromService:
          type: web
          name: eraser-ws
          property: host
