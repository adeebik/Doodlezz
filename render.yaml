envVarGroups:
  - name: eraser-shared
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false # User must provide this in Render dashboard
      - key: GITHUB_CLIENT_SECRET
        sync: false # User must provide this in Render dashboard

databases:
  - name: eraser-db
    databaseName: eraser
    plan: free

services:
  # Backend (HTTP Server)
  - type: web
    name: eraser-backend
    env: docker
    dockerContext: .
    dockerfilePath: docker/Dockerfile.be
    plan: free
    envVars:
      - fromGroup: eraser-shared
      - key: DATABASE_URL
        fromDatabase:
          name: eraser-db
          property: connectionString
      - key: PORT
        value: 3002
      - key: FE_URL
        fromService:
          type: web
          name: eraser-frontend
          property: host
      - key: BE_URL
        fromService:
          type: web
          name: eraser-backend
          property: host
      - key: WS_URL
        fromService:
          type: web
          name: eraser-ws
          property: host

  # WebSocket Server
  - type: web
    name: eraser-ws
    env: docker
    dockerContext: .
    dockerfilePath: docker/Dockerfile.ws
    plan: free
    envVars:
      - fromGroup: eraser-shared
      - key: DATABASE_URL
        fromDatabase:
          name: eraser-db
          property: connectionString
      - key: PORT
        value: 8080
      - key: FE_URL
        fromService:
          type: web
          name: eraser-frontend
          property: host
      - key: BE_URL
        fromService:
          type: web
          name: eraser-backend
          property: host
      - key: WS_URL
        fromService:
          type: web
          name: eraser-ws
          property: host

  # Frontend (Doodlezz)
  - type: web
    name: eraser-frontend
    env: docker
    dockerContext: .
    dockerfilePath: docker/Dockerfile.fe
    plan: free
    envVars:
      - key: BE_URL
        fromService:
          type: web
          name: eraser-backend
          property: host
      - key: WS_URL
        fromService:
          type: web
          name: eraser-ws
          property: host
      # Also provide NEXT_PUBLIC versions for standard Next.js behavior
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: eraser-backend
          property: host
      - key: NEXT_PUBLIC_WS_URL
        fromService:
          type: web
          name: eraser-ws
          property: host
